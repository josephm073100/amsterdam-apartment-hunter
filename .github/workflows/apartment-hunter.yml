name: Amsterdam Apartment Hunter

on:
  schedule:
    - cron: '0 8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  hunt-apartments:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install -r requirements.txt
    - run: python apartment_hunter.py
      env:
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
