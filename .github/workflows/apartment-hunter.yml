name: Amsterdam Apartment Hunter

on:
  schedule:
    - cron: '0 0,4,12,16,20 * * *'
  workflow_dispatch:

jobs:
  hunt-apartments:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run apartment hunter
      run: python apartment_hunter.py
      env:
        NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

    - name: Save seen apartments (persist between runs)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add seen_apartments.json || true
        git diff --staged --quiet || git commit -m "Update seen apartments [skip ci]"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
